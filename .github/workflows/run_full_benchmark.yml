name: ARQ-RAG Super Benchmark & Advanced Evaluation

on:
  workflow_dispatch:
    inputs:
      num_queries:
        description: 'Số lượng câu hỏi muốn chạy (mặc định 483)'
        required: true
        default: '500'

jobs:
  benchmark-and-eval:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📂 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-genai deepeval trulens-eval psutil supabase python-dotenv numpy langchain-community langchain-google-genai qdrant-client

      - name: 🚀 Run 5-Model Super Benchmark
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_API_KEY_2: ${{ secrets.GOOGLE_API_KEY_2 }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          QDRANT_CLOUD_URL: ${{ secrets.QDRANT_CLOUD_URL }}
          QDRANT_CLOUD_API_KEY: ${{ secrets.QDRANT_CLOUD_API_KEY }}
        run: |
          python backend/scripts/run_all_models.py

      - name: ⚖️ Advanced Scoring (DeepEval & TruLens)
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_API_KEY_2: ${{ secrets.GOOGLE_API_KEY_2 }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          # Chấm điểm cho toàn bộ 2500 kết quả vừa sinh ra
          python -c "import sys; sys.path.append('backend'); from shared.batch_evaluator import BatchEvaluator; BatchEvaluator().run_benchmark_eval(limit=3000)"

      - name: ✅ Final Report
        run: |
          echo "🎉 SIÊU THỰC NGHIỆM HOÀN TẤT!"
          echo "📊 Kết quả đã được cập nhật vào bảng 'benchmarks' trên Supabase."
          echo "🚀 Bạn có thể kiểm tra Dashboard hoặc xuất file Excel để làm báo cáo."
