services:
  backend:
    build:
      context: ./backend
    container_name: arq_rag_backend
    ports:
      - "8000:8000"
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SECRET_KEY=${SECRET_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL}
      - OLLAMA_BASE_URL=http://ollama:11434
      - QDRANT_LOCAL_URL=http://qdrant:6333
    depends_on:
      qdrant:
        condition: service_started
      ollama:
        condition: service_started
      qdrant-sync:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 4G
    volumes:
      - ./backend:/app
      - ./backend/data:/app/data

  qdrant:
    image: qdrant/qdrant
    container_name: arq_rag_qdrant
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_storage:/qdrant/storage

  qdrant-sync:
    build:
      context: ./backend
    container_name: arq_rag_sync
    environment:
      - QDRANT_CLOUD_URL=${QDRANT_CLOUD_URL}
      - QDRANT_CLOUD_API_KEY=${QDRANT_CLOUD_API_KEY}
      - QDRANT_LOCAL_URL=http://qdrant:6333
    volumes:
      - ./scripts:/app/scripts
    depends_on:
      qdrant:
        condition: service_started
    command: python /app/scripts/cloud/sync_cloud_to_local.py

  ollama:
    image: ollama/ollama
    container_name: arq_rag_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    entrypoint: [ "/bin/sh", "-c" ]
    command: >
      "ollama serve & sleep 10; ollama pull nomic-embed-text || true; wait"

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: arq_rag_tunnel
    restart: always
    command: tunnel --config /etc/cloudflared/config.yml run
    volumes:
      - ./.cloudflared:/etc/cloudflared
    depends_on:
      - backend


volumes:
  ollama_data:
