# ============================================================
# ARQ-RAG TurboQuant — Docker Compose
# Gom nhóm: Qdrant, Ollama (GPU), Backend FastAPI, Cloudflare Tunnel
# ============================================================

services:
  # ----------------------------------------------------------
  # Qdrant: Vector Database hỗ trợ Float32, PQ, SQ8
  # ----------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: arq_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      # Gắn kết thư mục host để dữ liệu index không mất khi restart
      - ./backend/data/qdrant_storage:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    networks:
      - arq_net

  # ----------------------------------------------------------
  # Ollama: Local Embedding với nomic-embed-text-v1.5
  # ----------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: arq_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    # Hỗ trợ GPU NVIDIA (comment out nếu chạy CPU-only)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # Tự động pull model nomic-embed-text khi container start
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 5 && ollama pull nomic-embed-text:v1.5 && wait"]
    networks:
      - arq_net

  # ----------------------------------------------------------
  # Backend: FastAPI
  # ----------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: arq_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      QDRANT_URL: http://qdrant:6333
      OLLAMA_URL: http://ollama:11434
    depends_on:
      - qdrant
      - ollama
    volumes:
      - ./backend:/app
    networks:
      - arq_net

  # ----------------------------------------------------------
  # Cloudflare Tunnel: Expose backend ra ngoài internet (optional)
  # ----------------------------------------------------------
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: arq_cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    env_file:
      - .env
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
    depends_on:
      - backend
    networks:
      - arq_net

networks:
  arq_net:
    driver: bridge

volumes:
  ollama_models:
