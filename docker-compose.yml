services:
  backend:
    build:
      context: ./backend
    container_name: arq_rag_backend
    ports:
      - "8000:8000"
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SECRET_KEY=${SECRET_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL}
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      - ollama
      - qdrant
    deploy:
      resources:
        limits:
          memory: 4G
    volumes:
      - ./backend:/app
      - ./backend/data:/app/data

  frontend:
    build:
      context: ./frontend
    container_name: arq_rag_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev
    depends_on:
      - backend

  qdrant:
    image: qdrant/qdrant
    container_name: arq_rag_qdrant
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_storage:/qdrant/storage

  ollama:
    image: ollama/ollama
    container_name: arq_rag_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    entrypoint: [ "/bin/sh", "-c" ]
    command: >
      "ollama serve & sleep 10; ollama pull nomic-embed-text || true; wait"

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: arq_rag_tunnel
    restart: always
    command: tunnel --config /etc/cloudflared/config.yml run
    volumes:
      - ./.cloudflared:/etc/cloudflared
    depends_on:
      - backend
      - frontend


volumes:
  ollama_data:
